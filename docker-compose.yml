# ─────────────────────────────────────────────────────────────────────────────
# bugX — Local Docker Compose (development)
# Run everything with:  docker compose up --build
# Stop everything with: docker compose down -v   (adds -v to wipe volumes too)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: xyz_platform
      POSTGRES_PASSWORD: xyz_platform
      POSTGRES_DB: xyz_platform
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xyz_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Judge0 (code execution engine) ──────────────────────────────────────────

  judge0-db:
    image: postgres:16.2
    restart: unless-stopped
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0_password
      POSTGRES_DB: judge0
    volumes:
      - judge0-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0"]
      interval: 5s
      timeout: 5s
      retries: 10

  judge0-redis:
    image: redis:7.2.4
    restart: unless-stopped
    command:
      - bash
      - -c
      - docker-entrypoint.sh --appendonly no --requirepass "judge0_redis_password"

  judge0-server:
    image: mrkushalsm/judge0:cgv2
    restart: always
    privileged: true
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0_password
      POSTGRES_DB: judge0
      POSTGRES_HOST: judge0-db
      REDIS_PASSWORD: judge0_redis_password
      REDIS_HOST: judge0-redis
      JUDGE0_ALLOW_ENABLE_NETWORK: "true"
      JUDGE0_ENABLE_WAIT_RESULT: "true"
      ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT: "true"
      ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT: "false"
      JAVA_TOOL_OPTIONS: "-Xmx128m"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    depends_on:
      - judge0-db
      - judge0-redis
    ports:
      - "2358:2358"

  judge0-workers:
    image: mrkushalsm/judge0:cgv2
    command: ["./scripts/workers"]
    restart: always
    privileged: true
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0_password
      POSTGRES_DB: judge0
      POSTGRES_HOST: judge0-db
      REDIS_PASSWORD: judge0_redis_password
      REDIS_HOST: judge0-redis
      ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT: "true"
      ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT: "false"
      JAVA_TOOL_OPTIONS: "-Xmx128m"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    depends_on:
      - judge0-db
      - judge0-redis

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >-
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app"
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      judge0-server:
        condition: service_started
    env_file:
      - ./backend/.env
    environment:
      # Override .env values with Docker-internal service hostnames
      ENV: development
      DATABASE_URL: postgresql+asyncpg://xyz_platform:xyz_platform@postgres:5432/xyz_platform
      ALEMBIC_DATABASE_URL: postgresql+psycopg2://xyz_platform:xyz_platform@postgres:5432/xyz_platform
      REDIS_URL: redis://redis:6379/0
      JUDGE0_URL: http://judge0-server:2358
      USE_LOCAL_JUDGE: "true"
      RATE_LIMIT_FAIL_OPEN: "true"
      PYTHONUTF8: "1"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m app.workers.submission_worker
    restart: unless-stopped
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      judge0-server:
        condition: service_started
      judge0-workers:
        condition: service_started
    env_file:
      - ./backend/.env
    environment:
      ENV: development
      DATABASE_URL: postgresql+asyncpg://xyz_platform:xyz_platform@postgres:5432/xyz_platform
      REDIS_URL: redis://redis:6379/0
      JUDGE0_URL: http://judge0-server:2358
      USE_LOCAL_JUDGE: "true"
      RATE_LIMIT_FAIL_OPEN: "true"
      PYTHONUTF8: "1"

  import-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m app.workers.import_worker
    restart: unless-stopped
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      ENV: development
      DATABASE_URL: postgresql+asyncpg://xyz_platform:xyz_platform@postgres:5432/xyz_platform
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_FAIL_OPEN: "true"
      PYTHONUTF8: "1"

  # ── Frontend (Vite dev server) ────────────────────────────────────────────────

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
      VITE_APP_NAME: bugX
      # Feature flags
      VITE_FEATURE_PUBLIC_PROFILES: "true"
      VITE_FEATURE_RESUME_EXPORT: "true"
      VITE_FEATURE_ANALYTICS: "true"
      VITE_FEATURE_DAILY_CHALLENGE: "true"
      VITE_FEATURE_TOPIC_MASTERY: "false"
      VITE_FEATURE_BADGES: "false"
      VITE_FEATURE_RATING_GRAPH: "false"
      VITE_FEATURE_SIMILAR_PROBLEMS: "false"
      VITE_FEATURE_COLLECTIONS: "false"
      VITE_FEATURE_ROADMAPS: "false"
      VITE_FEATURE_COMPANY_PREP: "false"
      VITE_FEATURE_VISUALIZER: "false"
      VITE_FEATURE_FORUM: "false"
      VITE_FEATURE_FRIENDS: "false"
      VITE_FEATURE_COMMUNITY_CHALLENGES: "false"
      VITE_FEATURE_NOTIFICATIONS: "false"
    depends_on:
      - api

volumes:
  judge0-data:
  postgres-data:
